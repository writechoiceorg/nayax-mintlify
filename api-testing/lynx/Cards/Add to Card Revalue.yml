info:
  name: Add to Card Revalue
  type: http
  seq: 14

http:
  method: POST
  url: https://qa-lynx.nayax.com/operational/v1/cards/TEST-CARD-V2-RETEST-001/revalue/add
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: CardCredit
      value: ""
      type: query
      enabled: true
    - name: CreditChangeRemarks
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards/TEST-CARD-004/revalue/add?CardCredit=0.01&CreditChangeRemarks=test
      method: POST
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"value":0.0300}
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards/TEST-CARD-004/revalue/add?CardCredit=0.01&CreditChangeRemarks=test
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
