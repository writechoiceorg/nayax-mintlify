info:
  name: Get Cards
  type: http
  seq: 1

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/cards
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: CardID
      value: ""
      type: query
      enabled: true
    - name: CardUniqueIdentifier
      value: ""
      type: query
      enabled: true
    - name: CardDisplayNumber
      value: ""
      type: query
      enabled: true
    - name: CardMobileNumber
      value: ""
      type: query
      enabled: true
    - name: ExternalApplicationUserID
      value: ""
      type: query
      enabled: true
    - name: CardEmail
      value: ""
      type: query
      enabled: true
    - name: CardHolderName
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards?CardUniqueIdentifier=TEST-CARD-004
      method: GET
