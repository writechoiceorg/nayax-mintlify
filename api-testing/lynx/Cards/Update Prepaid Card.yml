info:
  name: Update Prepaid Card
  type: http
  seq: 9

http:
  method: PUT
  url: https://qa-lynx.nayax.com/operational/v1/cards/{CardId}/prepaid
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      {
        "CardID": 0,
        "CardDiscountTypeBit": 0,
        "CardDiscountAmount": 0,
        "CardCreditTypeMoneyBit": true,
        "CardCreditAccumulateBit": false,
        "CardCreditSingleUseBit": false,
        "CardCredit": 0,
        "CardRevalueCredit": 0,
        "CreditAmountDailyLimit": 100,
        "CreditAmountMonthlyLimit": 1000,
        "CreditAmountMonthlyReload": 0
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards/999998796245511/prepaid
      method: PUT
      body:
        type: json
        data: |
          {"CardID":999998796245511,"CardDiscountTypeBit":0,"CardDiscountAmount":0,"CardCreditTypeMoneyBit":true,"CardCreditAccumulateBit":false,"CardCreditSingleUseBit":false,"CardCredit":0.03,"CardRevalueCredit":0.03,"CreditAmountDailyLimit":100,"CreditAmountMonthlyLimit":1000,"CreditAmountMonthlyReload":0}
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"PrepaidCard":{"CardID":999998796245511,"CardCreditTypeMoneyBit":true,"CardCredit":0.0300,"CardRevalueCredit":0.0300,"CreditAmountDailyLimit":100.0000,"CreditAmountMonthlyLimit":1000.0000,"CreditAmountCapture":0.0000,"CreditTransactionsCapture":0,"CreditAmountDailyUsage":0.0000,"CreditAmountWeeklyUsage":0.0000,"CreditAmountMonthlyUsage":0.0000,"CreditAmountTotalUsage":0.0000,"CreditTransactionsDailyUsage":0,"CreditTransactionsWeeklyUsage":0,"CreditTransactionsMonthlyUsage":0,"TransactionsTotalUsage":0,"CreditAmountMonthlyReload":0.0000},"Card":{"CardID":999998796245511,"ActorID":2009586082,"CardUniqueIdentifier":"TEST-CARD-004","CardDisplayNumber":"9990000004","CardHolderName":"Test User Updated","CardStatus":1,"CardType":33,"CardPhysicalType":2}}
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards/999998796245511/prepaid
      method: PUT
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
