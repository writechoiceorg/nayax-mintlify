info:
  name: Update Card Details
  type: http
  seq: 3

http:
  method: PUT
  url: https://qa-lynx.nayax.com/operational/v1/cards
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      {
        "CardID": 0,
        "ActorID": 0,
        "CardUniqueIdentifier": "",
        "CardDisplayNumber": "",
        "CardHolderName": "",
        "CardStatus": 0,
        "CardType": 0,
        "CardUserIdentity": "",
        "CountryID": 0,
        "Email": "",
        "MobileNumber": ""
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards
      method: PUT
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"MobileNumber":"","CardID":999998796245511,"ActorID":2009586082,"CardUniqueIdentifier":"TEST-CARD-004","CardDisplayNumber":"9990000004","CardHolderName":"Test User Updated","CardStatus":1,"CardType":33,"CardUserIdentity":"test004","UpdatedDt":"2026-05-14T23:24:12.987","CreatedDt":"2026-05-14T22:09:59.35","CreatedBy":1000294591,"UpdatedBy":1000294591,"CountryID":225,"Email":"test@example.com","CardPhysicalType":2,"MemberType":null,"use_wd_limit":false,"CardExternalApplicationUserID":null,"Refs":{"actor":"v1/actors/2009586082","country":"v1/countries/225","revalueBalance":"/v1/cards/999998796245511/revalue"}}
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards
      method: PUT
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
