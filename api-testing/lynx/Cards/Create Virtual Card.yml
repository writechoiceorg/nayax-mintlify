info:
  name: Create Virtual Card
  type: http
  seq: 2

http:
  method: POST
  url: https://qa-lynx.nayax.com/operational/v1/cards
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      {
        "ActorID": 0,
        "CardUniqueIdentifier": "",
        "CardDisplayNumber": "",
        "CardHolderName": "",
        "CardStatus": 0,
        "CardType": 0,
        "CardUserIdentity": "",
        "CountryID": 0,
        "Currency": 0,
        "MobileNumber": "",
        "Email": ""
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards
      method: POST
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"MobileNumber":"","CardID":999998796245531,"ActorID":2009586082,"CardUniqueIdentifier":"TEST-CARD-006","CardDisplayNumber":"9990000006","CardHolderName":"Test User 6","CardStatus":1,"CardType":33,"CardUserIdentity":"test006","UpdatedDt":"2026-05-14T23:24:12.614Z","CreatedDt":"2026-05-14T23:24:12.614Z","CreatedBy":1000294591,"UpdatedBy":1000294591,"CountryID":225,"Email":"test6@example.com","CardPhysicalType":2,"MemberType":null,"CardActivationDate":null,"CardExpirationDate":null,"CardImageUrl":null,"CardNote":null,"use_wd_limit":null,"CardExternalApplicationUserID":null,"Refs":{"actor":"v1/actors/2009586082","country":"v1/countries/225","revalueBalance":"/v1/cards/999998796245531/revalue"}}
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
