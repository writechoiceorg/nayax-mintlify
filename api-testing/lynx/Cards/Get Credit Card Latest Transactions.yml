info:
  name: Get Credit Card Latest Transactions
  type: http
  seq: 12

http:
  method: POST
  url: https://qa-lynx.nayax.com/operational/v1/cards/query
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: minutes
      value: ""
      type: query
      enabled: true
  body:
    type: json
    data: |
      ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards/query
      method: POST
      body:
        type: json
        data: '"uKEg0qE20Mse/xQSupHOwXWKvqY="'
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          []
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards/query
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
