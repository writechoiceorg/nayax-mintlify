info:
  name: Update Card Groups
  type: http
  seq: 18

http:
  method: PUT
  url: https://qa-lynx.nayax.com/operational/v1/cards/{CardId}/cardGroups
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      [
        {
          "CardGroupId": 0,
          "GroupName": "",
          "CardGroupEnabledBit": true,
          "GroupDailyLimit": 0
        }
      ]

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards/999998796245511/cardGroups
      method: PUT
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          [{"CardGroupEnabledBit":true,"GroupName":"APITest","CardGroupId":1002880251,"GroupDailyLimit":null,"UpdatedBy":1000294591,"LastUpdated":"2026-05-14T22:10:54.85"}]
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards/999998796245511/cardGroups
      method: PUT
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
