info:
  name: Transfer Revalue Between Cards
  type: http
  seq: 15

http:
  method: POST
  url: https://qa-lynx.nayax.com/operational/v1/cards/{FromCardUniqueIdentifier}/revalue/send/{ToCardUniqueIdentifier}
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: CardCredit
      value: ""
      type: query
      enabled: true
    - name: CreditChangeRemarks
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK — returns remaining revalue balance of source card
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards/TEST-CARD-V2-RETEST-001/revalue/send/TEST-CARD-V2-005?CardCredit=0.01&CreditChangeRemarks=test-transfer
      method: POST
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"value":0.0200}
  - name: 400 — destination card does not have RevalueCashBit enabled
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards/TEST-CARD-V2-RETEST-001/revalue/send/TEST-CARD-004
      method: POST
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"This Card is not defined as Revalue","isUserError":false,"errorKey":null}
