info:
  name: Get Card Group
  type: http
  seq: 11

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/cards/{cardId}/cardGroups
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards/999998796245511/cardGroups
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          [{"CardGroupEnabledBit":true,"GroupName":"APITest","CardGroupId":1002880251,"GroupDailyLimit":null,"UpdatedBy":1000294591,"LastUpdated":"2026-05-14T22:10:54.85"}]
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cards/999998796245511/cardGroups
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
