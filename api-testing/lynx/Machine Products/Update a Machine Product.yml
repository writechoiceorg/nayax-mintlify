info:
  name: Update a Machine Product
  type: http
  seq: 5

http:
  method: PUT
  url: https://qa-lynx.nayax.com/operational/v1/machines/{MachineID}/machineProducts/{MachineProductID}
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      {
        "MachineProductID": 0,
        "NayaxProductID": 0,
        "MachineID": 0,
        "MDBCode": 0,
        "PAR": 0,
        "CashPrice": 0,
        "CreditCardPrice": 0,
        "MachinePrice": 0,
        "RetailPrice": 0,
        "DEXProductName": "",
        "PACode": "",
        "PCCode": ""
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002511581/machineProducts/5293070291833924738
      method: PUT
      body:
        type: json
        data: |
          {"MachineProductID":"5293070291833924738","NayaxProductID":999998535696561,"MachineID":1002511581,"MDBCode":2,"PAR":5,"CashPrice":3.00,"CreditCardPrice":3.00,"MachinePrice":3.00,"RetailPrice":3.00,"DEXProductName":"TestProd Updated","PACode":"B1","PCCode":"02"}
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"DexPrice":0.00,"ProductRef":"v1/products/999998535696561","MachineProductRef":"v1/machines/1002511581/machineProducts/5293070291833924738","MachineRef":"/v1/machines/1002511581","MachineProductID":"5293070291833924738","NayaxProductID":999998535696561,"MachineID":1002511581,"MDBCode":2,"PAR":5,"CashPrice":3.0000,"CreditCardPrice":3.0000,"RetailPrice":3.0000,"DEXProductName":"TestProd Updated","PACode":"B1","PCCode":"02","LastUpdated":"2026-05-15T20:00:00.000","ProductGroupID":2147111052,"slow_mover":false}
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002511581/machineProducts/5293070291833924738
      method: PUT
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
