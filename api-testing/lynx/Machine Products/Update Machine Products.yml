    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002511581/machineProducts?avoidDelete=true
      method: PUT
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
