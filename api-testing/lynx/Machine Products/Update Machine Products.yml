info:
  name: Update Machine Products
  type: http
  seq: 3

http:
  method: PUT
  url: https://qa-lynx.nayax.com/operational/v1/machines/{MachineID}/machineProducts
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: avoidDelete
      value: ""
      type: query
      enabled: true
  body:
    type: json
    data: |
      [
        {
          "MachineProductID": 0,
          "NayaxProductID": 0,
          "MachineID": 0,
          "MDBCode": 0,
          "PAR": 0,
          "CashPrice": 0,
          "CreditCardPrice": 0,
          "MachinePrice": 0,
          "RetailPrice": 0,
          "DEXProductName": "",
          "PACode": "",
          "PCCode": ""
        }
      ]

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002511581/machineProducts?avoidDelete=true
      method: PUT
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          [{"DexPrice":0.00,"ProductRef":"v1/products/999998535696561","MachineProductRef":"v1/machines/1002511581/machineProducts/5293070291833924738","MachineRef":"/v1/machines/1002511581","MachineProductID":"5293070291833924738","NayaxProductID":999998535696561,"MachineID":1002511581,"MDBCode":2,"PAR":5,"CashPrice":2.5000,"CreditCardPrice":2.5000,"RetailPrice":2.5000,"DEXProductName":"TestProd","PACode":"B1","PCCode":"02","LastUpdated":"2026-05-14T23:24:15.357","ProductGroupID":2147111052,"slow_mover":false}]
