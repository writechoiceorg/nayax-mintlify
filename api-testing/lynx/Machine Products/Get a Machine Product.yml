info:
  name: Get a Machine Product
  type: http
  seq: 4

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/machines/{MachineID}/machineProducts/{MachineProductID}
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002511581/machineProducts/5293070291833924738
      method: GET
    response:
