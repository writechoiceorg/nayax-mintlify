info:
  name: Add Actor Group
  type: http
  seq: 19

http:
  method: POST
  url: https://qa-lynx.nayax.com/operational/v1/actors/{ActorID}/roleGroups
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      [
        {
          "RoleGroupId": 0
        }
      ]

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 400 — role groups must be configured by Nayax for this actor
    request:
      url: https://qa-lynx.nayax.com/operational/v1/actors/2009586082/roleGroups
      method: POST
      body:
        type: json
        data: '[{"RoleGroupId": 3}]'
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"The following groups are not available for actor id 2009586082: 3","isUserError":false,"errorKey":"create_actor_groups_not_allowed"}
