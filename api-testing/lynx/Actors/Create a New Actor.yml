info:
  name: Create a New Actor
  type: http
  seq: 4

http:
  method: POST
  url: https://qa-lynx.nayax.com/operational/v1/actors/{ParentActorID}
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      {
        "ParentActorID": 2009586082,
        "ActorDescription": "APITest-Area",
        "ActorCode": 999001,
        "ActorAddress": "",
        "ActorContact": "",
        "ActorTypeID": 5,
        "ActorStatus": 1,
        "CurrencyID": 3,
        "CountryID": 225,
        "TimeZoneKey": 15,
        "DayLightSavingsBit": true
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/actors/2009586082
      method: POST
      body:
        type: json
        data: |
          {
            "ParentActorID": 2009586082,
            "ActorDescription": "APITest-Area",
            "ActorCode": 999001,
            "ActorTypeID": 5,
            "ActorStatus": 1,
            "CurrencyID": 3,
            "CountryID": 225,
            "TimeZoneKey": 15,
            "DayLightSavingsBit": true
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {
            "ParentActorID": 2009586082,
            "ActorID": 2009615022,
            "ActorDescription": "APITest-Area",
            "ActorCode": 999001,
            "ActorTypeID": 5,
            "ActorStatus": 1,
            "ActorHierarchyLevel": 3,
            "CurrencyID": 3,
            "CountryID": 225,
            "TimeZoneKey": 15,
            "DayLightSavingsBit": true,
            "ActorHierarchy": "Nayax Integrations / Writechoice.io / APITest-Area /",
            "ActorHasChildrenBit": false,
            "ActorHasMachinesBit": false,
            "AreaActorID": 2009615022,
            "OperatorActorID": 2009586082,
            "DistributorActorID": 2001312062,
            "ActorMerchantBit": "False",
            "Refs": {
              "parentActor": "v1/actors/2009586082",
              "timeZone": "v1/timeZones/15",
              "country": "v1/countries/225",
              "currency": "v1/currencies/3",
              "actorType": "v1/actorTypes?ActorTypeID=3"
            }
          }
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/actors/2009586082
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
