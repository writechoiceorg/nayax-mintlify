info:
  name: Get Operator EV Meter Dashboard
  type: http
  seq: 10

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/actors/2009586082/evDashboard
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: StartDate
      value: ""
      type: query
      enabled: true
    - name: EndDate
      value: ""
      type: query
      enabled: true
    - name: MachineID
      value: ""
      type: query
      enabled: true
    - name: TimePeriod
      value: ""
      type: query
      enabled: true
    - name: MachineNumber
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
