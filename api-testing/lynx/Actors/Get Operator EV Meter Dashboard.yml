    request:
      url: https://qa-lynx.nayax.com/operational/v1/actors/2009586082/evDashboard?TimePeriod=1
      method: GET
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "TimePeriod:1 is not valid",
            "stack": null,
            "isUserError": false,
            "errorKey": null,
            "error": null,
