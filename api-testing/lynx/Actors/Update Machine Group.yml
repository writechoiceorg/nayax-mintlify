info:
  name: Update Machine Group
  type: http
  seq: 17

http:
  method: PUT
  url: https://qa-lynx.nayax.com/operational/v1/actor/{ActorID}/machineGroups
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      {
        "MachineGroupId": 0,
        "MachineGroupName": "",
        "MachineGroupCode": 0,
        "MachineGroupStatus": 1,
        "LanguageId": 0
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK — MachineGroupId is in the body (not the path)
    request:
      url: https://qa-lynx.nayax.com/operational/v1/actor/2009586082/machineGroups
      method: PUT
      body:
        type: json
        data: '{"MachineGroupId": 1002953511, "MachineGroupName": "API-Test-Group-Updated", "MachineGroupCode": 9999, "MachineGroupStatus": 1}'
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"MachineGroupId":1002953511,"ActorId":2009586082,"MachineGroupName":"API-Test-Group-Updated","MachineGroupCode":9999,"MachineGroupStatus":1,"CreatedBy":1000294591,"CreatedOn":"2026-05-21T16:23:22.203","UpdatedOn":"2026-05-21T16:24:45.2506003Z","UpdatedBy":1000294591}
  - name: 404 — MachineGroupId in path is not valid; include it in the body
    request:
      url: https://qa-lynx.nayax.com/operational/v1/actor/2009586082/machineGroups/1002953511
      method: PUT
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: content-length
          value: "0"
      body:
        type: text
        data: ""
