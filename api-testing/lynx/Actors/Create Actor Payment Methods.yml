  url: https://qa-lynx.nayax.com/operational/v1/actors/2009586082/paymentMethods
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      [
        {
          "ActorID": 2009586082,
          "PaymentMethodID": 1,
          "ExtraChargePercentageBit": false,
          "ExtraChargeValue": 0,
          "ExtraChargeBackupValue": 0
        }
      ]

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
