        data: |-
          [{"ActorID":2009586082,"PaymentMethodID":2,"ExtraChargePercentageBit":false,"ExtraChargeValue":0.0,"LastUpdated":"2026-05-21T01:34:51.6022955Z","ExternalPaymentProviderURL":null,"ExternalPaymentProviderID":null,"ExternalPaymentProviderModeID":null,"ExternalPaymentProviderUsername":null,"ExternalPaymentProviderPassword":null,"ExternalPaymentProviderMerchantID":null,"ExternalPaymentProviderKey":null,"ExternalPaymentProviderAppID":null,"ExternalPaymentProviderCertificatePath":null,"ExternalPaymentProviderCertificatePassword":null,"ExternalPaymentProviderApiKey":null,"ExternalPaymentProviderLocationIdentifier":null,"PaymentMethodWorkingDays":null,"PaymentMethodCustomData":null,"ExtraChargeBackupValue":0.0,"ChargeMachineID":null}]
