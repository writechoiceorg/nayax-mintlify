info:
  name: Get Actor Hierarchy for Current User
  type: http
  seq: 12

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/actors/hierarchy
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: ActorID
      value: ""
      type: query
      enabled: true
    - name: StatusID
      value: ""
      type: query
      enabled: true
    - name: HierarchyLevelLimit
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/actors/hierarchy
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-length
          value: "162"
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {
            "ParentActorID": 2001312062,
            "ActorID": 2009586082,
            "ActorDescription": "Writechoice.io",
            "ActorTypeID": 2,
            "ActorStatus": 1,
            "ActorHierarchyLevel": 2,
            "ActorChildren": null
          }
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/actors/hierarchy
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
