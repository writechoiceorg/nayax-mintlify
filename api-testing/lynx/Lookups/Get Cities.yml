info:
  name: Get Cities
  type: http
  seq: 15

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/cities
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: CountryID
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cities?CountryID=225&StateID=1
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          [{"CityID":190882,"CityName":"  Aiea","ShortCity":null,"RegionID":null,"CountryID":null},{"CityID":187160,"CityName":"  Ewa Beach","ShortCity":null,"RegionID":null,"CountryID":null},{"CityID":3889,"CityName":"11-Mile Canyon Res","ShortCity":null,"RegionID":null,"CountryID":null}]
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/cities?CountryID=225&StateID=1
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
