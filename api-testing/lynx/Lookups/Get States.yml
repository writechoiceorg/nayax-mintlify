info:
  name: Get States
  type: http
  seq: 14

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/states
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: CountryID
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/states?CountryID=225
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          [{"RegionID":1,"RegionName":"Alabama","ShortRegion":null,"CountryID":null},{"RegionID":2,"RegionName":"Alaska","ShortRegion":null,"CountryID":null},{"RegionID":3,"RegionName":"Arizona","ShortRegion":null,"CountryID":null}]
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/states?CountryID=225
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
