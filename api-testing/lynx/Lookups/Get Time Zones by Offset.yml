info:
  name: Get Time Zones by Offset
  type: http
  seq: 6

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/timeZones
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: TimeZoneOffset
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/timeZones?TimeZoneOffset=-5
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          [{"TimeZoneKey":73,"TimeZoneID":"SA Pacific Standard Time","TimeZoneDisplayName":"(GMT-05:00) Bogota, Lima, Quito, Rio Branco","TimeZoneStandardName":"SA Pacific Standard Time","TimeZoneDayLightName":"SA Pacific Daylight Time","TimeZoneOffset":-5.00,"CreatedDate":"2008-11-23T18:03:41.907","LastUpdated":null,"DaylightSavingsBit":false,"Latitude":4.59805560,"Longitude":-74.07583330},{"TimeZoneKey":74,"TimeZoneID":"Eastern Standard Time","TimeZoneDisplayName":"(GMT-05:00) Eastern Time (US \u0026 Canada)","TimeZoneStandardName":"Eastern Standard Time","TimeZoneDayLightName":"Eastern Daylight Time","TimeZoneOffset":-5.00,"CreatedDate":"2008-11-23T18:03:41.92","LastUpdated":"2026-03-31T07:37:46.98","DaylightSavingsBit":true,"Latitude":49.89975410,"Longitude":-97.13749370},{"TimeZoneKey":75,"TimeZoneID":"US Eastern Standard Time","TimeZoneDisplayName":"(GMT-05:00) Indiana (East)","TimeZoneStandardName":"US Eastern Standard Time","TimeZoneDayLightName":"US Eastern Daylight Time","TimeZoneOffset":-5.00,"CreatedDate":"2008-11-23T18:03:41.937","LastUpdated":"2026-03-31T07:37:47.13","DaylightSavingsBit":true,"Latitude":40.26719410,"Longitude":-86.13490190}]
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/timeZones?TimeZoneOffset=-5
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
