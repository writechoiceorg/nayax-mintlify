info:
  name: Get Countries
  type: http
  seq: 8

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/countries
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: CountryID
      value: ""
      type: query
      enabled: true
    - name: DialCode
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/countries
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          [{"CountryID":1,"CountryCode":"AF","CountryName":"AFGHANISTAN","CountryDialingCode":93,"CountryReference":1024,"CountryISONumericCode":4},{"CountryID":2,"CountryCode":"AL","CountryName":"ALBANIA","CountryDialingCode":355,"CountryReference":4028,"CountryISONumericCode":8},{"CountryID":3,"CountryCode":"DZ","CountryName":"ALGERIA","CountryDialingCode":213,"CountryReference":5033,"CountryISONumericCode":12}]
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/countries
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
