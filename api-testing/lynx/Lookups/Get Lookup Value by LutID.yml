info:
  name: Get Lookup Value by LutID
  type: http
  seq: 5

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/lookups/values/{LutID}
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/lookups/values/30000512
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"LutTypeRef":"/v1/lookupTypes/?LutTypeID=49","LutID":30000512,"LutTypeID":49,"LutValue":"Live Transactions","LastUpdated":"2014-11-18T13:06:32.73","OrderKey":1,"LutCode":null,"Ckey":"sale_source_mdb","ServiceLutId":null,"Created DT":"2014-11-18T13:06:32.73","Created BT":null,"Updated By":null,"LinkedLutId":null}
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/lookups/values/30000512
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
