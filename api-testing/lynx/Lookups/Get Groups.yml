info:
  name: Get Groups
  type: http
  seq: 16

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/groups
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: GroupID
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/groups
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          [{"RoleGroupID":1,"RoleGroupName":"Nayax System Operator","UpdatedDT":"2008-08-21T11:38:22.343","ManagedByAdminBit":false},{"RoleGroupID":2,"RoleGroupName":"Device reseller","UpdatedDT":"2018-12-02T16:14:42.727","ManagedByAdminBit":false},{"RoleGroupID":3,"RoleGroupName":"Vending Operator - VMO","UpdatedDT":"2011-05-17T13:55:19.22","ManagedByAdminBit":false}]
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/groups
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
