info:
  name: Get All Actor Types
  type: http
  seq: 1

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/actorTypes
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: ActorTypeID
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/actorTypes
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          [{"ActorTypeID":1,"ActorTypeName":"Parent","LastUpdated":"2011-09-19T06:00:22.01","DefaultBit":true,"CKey":"parent"},{"ActorTypeID":2,"ActorTypeName":"Operator","LastUpdated":"2011-09-19T06:00:22.01","DefaultBit":true,"CKey":"oper"},{"ActorTypeID":3,"ActorTypeName":"Institute / Customer","LastUpdated":"2011-09-19T06:00:22.01","DefaultBit":true,"CKey":"institute"}]
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/actorTypes
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
