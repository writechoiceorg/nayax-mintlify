info:
  name: Get Payment Methods
  type: http
  seq: 13

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/paymentMethods
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: PaymentMethodID
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/paymentMethods
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          [{"PaymentMethodID":0,"PaymentMethodDescription":"Grouped Tran","LastUpdated":"Dec  6 202","PrepaidPaymentBit":false,"PreselectionSupportBit":null,"TransactionBlockDuration":null,"AutomaticVoidBit":null,"CKey":"grouped_tran","ExternalPrepaidBit":false,"MobileApplicationBit":false,"QRPaymentSupportBit":null,"ForceSettlementSupportBit":null},{"PaymentMethodID":1,"PaymentMethodDescription":"Credit Card","LastUpdated":"05/02/2007","PrepaidPaymentBit":false,"PreselectionSupportBit":1,"TransactionBlockDuration":null,"AutomaticVoidBit":true,"CKey":"credit_card","ExternalPrepaidBit":false,"MobileApplicationBit":false,"QRPaymentSupportBit":null,"ForceSettlementSupportBit":null},{"PaymentMethodID":2,"PaymentMethodDescription":"Prepaid Credit","LastUpdated":"05/02/2007","PrepaidPaymentBit":true,"PreselectionSupportBit":null,"TransactionBlockDuration":null,"AutomaticVoidBit":null,"CKey":"prepaid_credit","ExternalPrepaidBit":false,"MobileApplicationBit":false,"QRPaymentSupportBit":null,"ForceSettlementSupportBit":null}]
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/paymentMethods
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
