info:
  name: Create Pick List
  type: http
  seq: 2

http:
  method: POST
  url: https://qa-lynx.nayax.com/operational/v1/machines/{MachineID}/pickList
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: UseMinPick
      value: ""
      type: query
      enabled: true
    - name: AddOnlineSales
      value: ""
      type: query
      enabled: true
    - name: AddEstimatedSales
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002511581/pickList?UseMinPick=false&AddOnlineSales=false&AddEstimatedSales=false
      method: POST
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-

  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002511581/pickList?UseMinPick=false&AddOnlineSales=false&AddEstimatedSales=false
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
