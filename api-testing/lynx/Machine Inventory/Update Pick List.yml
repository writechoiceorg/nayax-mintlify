info:
  name: Update Pick List
  type: http
  seq: 6

http:
  method: PUT
  url: https://qa-lynx.nayax.com/operational/v1/machines/inventory/picklists/update
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      [
        {
          "MachineId": 0,
          "Products": []
        }
      ]

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 500 Server Error
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/inventory/picklists/update
      method: PUT
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Value cannot be null. (Parameter source)","isUserError":false,"errorKey":null}
