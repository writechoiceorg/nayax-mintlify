info:
  name: Sign In
  type: http
  seq: 2

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/signin
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK (Web UI)
    request:
      url: https://qa-lynx.nayax.com/operational/signin
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: text/html; charset=utf-8
      body:
        type: json
        data: |-
          {"note":"GET /signin returns the Lynx web login UI (HTML), not a JSON API. Authenticate via bearer token from Account Settings instead."}
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/signin
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
