info:
  name: Decline a Payment Refund
  type: http
  seq: 2

http:
  method: POST
  url: https://qa-lynx.nayax.com/operational/v1/payment/refund-decline
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      {
        "DeclineReason": "",
        "TransactionId": 0,
        "SiteId": 0,
        "MachineAuTime": "2024-01-01T00:00:00Z"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 403 Forbidden
    request:
      url: https://qa-lynx.nayax.com/operational/v1/payment/refund-decline
      method: POST
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Insufficient permissions to perform this action.","isUserError":false,"errorKey":null}
