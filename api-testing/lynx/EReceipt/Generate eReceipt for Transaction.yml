info:
  name: Generate eReceipt for Transaction
  type: http
  seq: 1

http:
  method: POST
  url: https://qa-lynx.nayax.com/operational/v1/ereceipt/generate
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      {
        "TrasactionID": 0,
        "TransactionDateTime": "2024-01-01T00:00:00Z",
        "TrasactionSiteID": 0,
        "MachineID": 0,
        "FullName": "",
        "Email": ""
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 403 Forbidden
    request:
      url: https://qa-lynx.nayax.com/operational/v1/ereceipt/generate
      method: POST
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Insufficient permissions to perform this action.","isUserError":false,"errorKey":null}
