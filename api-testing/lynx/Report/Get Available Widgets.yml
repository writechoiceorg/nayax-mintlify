info:
  name: Get Available Widgets
  type: http
  seq: 2

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/dashboard/widgets
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: screenTypeId
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/dashboard/widgets?screenTypeId=1
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          [{"WidgetTypeId":43,"WidgetName":"Dashboard Active Machines Boxes","WidgetConfig":{"filters":[]},"Categories":[1,7,4,2,3],"Groups":[2,4]},{"WidgetTypeId":53,"WidgetName":"Dashboard Sales Table","WidgetConfig":{"filters":[{"name":"with_cash","defaultValue":"1","hidden":true,"type":"bit"}]},"Categories":[1,7,4,2,3],"Groups":[2,4]},{"WidgetTypeId":203,"WidgetName":"Machines On Map","WidgetConfig":{"filters":[]},"Categories":[1,7,4,2,3],"Groups":[1,3]}]
  - name: 500 Internal Server Error — screenTypeId=0 triggers crash
    request:
      url: https://qa-lynx.nayax.com/operational/v1/dashboard/widgets?screenTypeId=0
      method: GET
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Object reference not set to an instance of an object.","isUserError":false,"errorKey":null}
