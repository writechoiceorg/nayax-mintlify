info:
  name: Retrieve Widget Data
  type: http
  seq: 1

http:
  method: POST
  url: https://qa-lynx.nayax.com/operational/v1/dashboard/get-widget-data
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      {
        "ScreenTypeId": 0,
        "EntityId": 0,
        "WidgetTypeId": 0,
        "Filters": []
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/dashboard/get-widget-data
      method: POST
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"WidgetDetails":{"WidgetTypeId":43,"WidgetName":"Dashboard Active Machines Boxes","WidgetConfig":{"filters":[]},"Categories":[1,7,4,2,3],"Groups":[2,4]},"Data":[[{"ACTIVE_MACHINES":1,"KEEP_ALIVE_LAST_HOUR":0,"NO_KEEP_ALIVE_LAST_HOUR":0,"NO_KEEP_ALIVE_LAST_24_HOURS":1}]]}
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/dashboard/get-widget-data
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
