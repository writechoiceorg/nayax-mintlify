info:
  name: Get Payment Methods for Machine
  type: http
  seq: 11

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/machines/{MachineID}/paymentMethods
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002511581/paymentMethods
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          [{"MachineID":1002511581,"PaymentMethodID":1,"ConvenienceFeePercentageBit":false,"ConvenienceFeeValue":0.5,"LastUpdated":"2026-05-15T21:40:49.2000216Z","ExternalPaymentProviderUsername":null,"ExternalPaymentProviderPassword":null,"ExternalPaymentProviderTerminalID":null,"ExternalPaymentProviderLocationIdentifier":null,"PaymentMethodWorkingDays":null,"PaymentMethodCustomData":"{\"use_phone_contact\":false,\"use_phone_contactless\":false,\"use_phone_transaction\":false}","ConvenienceFeeBackupValue":0.0,"PaymentMethodQRString":null}]
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002511581/paymentMethods
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
