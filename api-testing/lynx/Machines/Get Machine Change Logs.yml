info:
  name: Get Machine Change Logs
  type: http
  seq: 6

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/machines/changeLogs
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: ActorID
      value: ""
      type: query
      enabled: true
    - name: StartDate
      value: ""
      type: query
      enabled: true
    - name: EndDate
      value: ""
      type: query
      enabled: true
    - name: MachineID
      value: ""
      type: query
      enabled: true
    - name: TimePeriod
      value: ""
      type: query
      enabled: true
    - name: MachineNumber
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/changeLogs?ActorID=2009586082
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          [{"MachineID":"1002511581","ChangedItem":"Show picklist selecton as","ChangedFrom":"MDB Code","ChangedTo":"","Tab":"General","ChangedBy":"Anayse Sardinha","UpdatedDt":"2026-05-14T20:17:03.04"},{"MachineID":"1002511581","ChangedItem":"Enable EReceipt","ChangedFrom":"Disable","ChangedTo":"","Tab":"General","ChangedBy":"Anayse Sardinha","UpdatedDt":"2026-05-14T20:17:03.04"},{"MachineID":"1002511581","ChangedItem":"Apply default to reports also","ChangedFrom":"Disable","ChangedTo":"","Tab":"General","ChangedBy":"Anayse Sardinha","UpdatedDt":"2026-05-14T20:17:03.04"}]
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/changeLogs?ActorID=2009586082
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
