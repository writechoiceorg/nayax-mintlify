info:
  name: Search Machine Basic Info
  type: http
  seq: 5

http:
  method: POST
  url: https://qa-lynx.nayax.com/operational/v1/machines/search
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      {
        "MachineID": 0,
        "StatusID": 0,
        "Search": ""
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/search
      method: POST
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          [{"typeID":null,"ID":"underOp2009586082","parentID":"2009586082","Disabled":null,"Name":"Unassigned Area"},{"typeID":0,"ID":"1002511581","parentID":"underOp2009586082","Disabled":null,"Name":"12345"},{"typeID":2,"ID":"2009586082","parentID":"2001312062","Disabled":null,"Name":"Writechoice.io"}]
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/search
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
