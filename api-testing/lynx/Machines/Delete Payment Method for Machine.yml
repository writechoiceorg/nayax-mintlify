info:
  name: Delete Payment Method for Machine
  type: http
  seq: 15

http:
  method: DELETE
  url: https://qa-lynx.nayax.com/operational/v1/machines/{MachineID}/paymentMethods/{paymentMethodID}
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002529791/paymentMethods/1
      method: DELETE
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"Ok":true,"Message":null,"SystemMessage":null,"code":null}
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002529791/paymentMethods/1
      method: DELETE
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
