info:
  name: Get Machine Last Alerts
  type: http
  seq: 10

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/machines/{MachineID}/lastAlerts
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002511581/lastAlerts
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          [{"MachineID":1002511581,"EventDateTimeVMC":"2026-05-15T01:13:54.203","TransactionID":null,"EventLogID":200153075456,"SiteID":1,"EntityTypeID":140,"EntityTypeName":"Machine","DeviceID":null,"EntityActorID":2009586082,"EventDateTimeGMT":"2026-05-14T22:13:54.203","EventCode":508,"EventSourceID":2,"EventSourceName":"Web - Application","EventGroupId":20,"EventGroupName":"Stock","EventCategoryId":59,"EventCategoryName":"Inventory","EventDescription":"Pick List Deleted for Machine","EventData":"Anayse Sardinha Deleted Pick List","JSONData":null,"EventUserID":null}]
