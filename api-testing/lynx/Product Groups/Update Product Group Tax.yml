info:
  name: Update Product Group Tax
  type: http
  seq: 7

http:
  method: PUT
  url: https://qa-lynx.nayax.com/operational/v1/productGroups/{ProductGroupID}/tax
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      [
        {
          "TaxRowID": 0,
          "CountryID": 0,
          "CityID": 0,
          "RegionID": 0,
          "TaxValue": 0,
          "TaxCode": 0
        }
      ]

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 403 Forbidden — permissions not granted for sandbox token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/productGroups/{ProductGroupID}/tax
      method: PUT
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Insufficient permissions to perform this action.","isUserError":false,"errorKey":null}
