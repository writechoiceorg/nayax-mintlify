info:
  name: Get Product Group Tax
  type: http
  seq: 6

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/productGroups/{ProductGroupID}/tax
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: TaxRowID
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 403 Forbidden — permissions not granted for sandbox token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/productGroups/{ProductGroupID}/tax
      method: GET
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Insufficient permissions to perform this action.","isUserError":false,"errorKey":null}
