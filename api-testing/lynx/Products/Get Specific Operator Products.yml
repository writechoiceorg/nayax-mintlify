info:
  name: Get Specific Operator Products
  type: http
  seq: 1

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/operators/{OperatorID}/products
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

