info:
  name: Get Route Machines
  type: http
  seq: 8

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/Scheduling/route-machines
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: RouteId
      value: ""
      type: query
      enabled: false
    - name: MachineId
      value: "1002529791"
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK — machine not assigned to any route
    request:
      url: https://qa-lynx.nayax.com/operational/v1/Scheduling/route-machines?MachineId=1002529791
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          []
  - name: 400 — OperatorId alone is not accepted; use MachineId or RouteId
    request:
      url: https://qa-lynx.nayax.com/operational/v1/Scheduling/route-machines?OperatorId=2009586082
      method: GET
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"You must insert at least one value for Route Id, Machine Id, or Operator Id","isUserError":false,"errorKey":null}
