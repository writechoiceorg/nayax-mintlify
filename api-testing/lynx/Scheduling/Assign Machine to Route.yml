info:
  name: Assign Machine to Route
  type: http
  seq: 9

http:
  method: POST
  url: https://qa-lynx.nayax.com/operational/v1/Scheduling/route-machines
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: RouteId
      value: ""
      type: query
      enabled: true
  body:
    type: json
    data: |
      {
        "MachineIds": [0]
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 500 Server Error — no valid routes exist in sandbox to assign to
    request:
      url: https://qa-lynx.nayax.com/operational/v1/Scheduling/route-machines?RouteId=1
      method: POST
      body:
        type: json
        data: '{"MachineIds": [1002511581]}'
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Oops, an error has occurred","isUserError":false,"errorKey":null}
