info:
  name: Assign Machine to Route
  type: http
  seq: 9

http:
  method: POST
  url: https://qa-lynx.nayax.com/operational/v1/Scheduling/route-machines
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: RouteId
      value: ""
      type: query
      enabled: true
  body:
    type: json
    data: |
      {
        "MachineIds": [0]
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 403 Forbidden — permissions not granted for sandbox token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/Scheduling/route-machines
      method: POST
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Insufficient permissions to perform this action.","isUserError":false,"errorKey":null}
