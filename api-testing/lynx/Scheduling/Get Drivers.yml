info:
  name: Get Drivers
  type: http
  seq: 1

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/Scheduling/drivers
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: ActorId
      value: ""
      type: query
      enabled: true
    - name: DriverStatusId
      value: ""
      type: query
      enabled: true
    - name: Search
      value: ""
      type: query
      enabled: true
    - name: SearchByDriverId
      value: ""
      type: query
      enabled: true
    - name: SearchByUserId
      value: ""
      type: query
      enabled: true
    - name: SearchByFullname
      value: ""
      type: query
      enabled: true
    - name: SearchByMobile
      value: ""
      type: query
      enabled: true
    - name: SearchByEmail
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK — no drivers configured in sandbox
    request:
      url: https://qa-lynx.nayax.com/operational/v1/Scheduling/drivers?ActorId=2009586082
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          []
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/Scheduling/drivers
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
