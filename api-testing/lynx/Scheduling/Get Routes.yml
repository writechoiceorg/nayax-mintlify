info:
  name: Get Routes
  type: http
  seq: 5

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/Scheduling/routes
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: OperatorId
      value: ""
      type: query
      enabled: true
    - name: DriverId
      value: ""
      type: query
      enabled: true
    - name: Status
      value: ""
      type: query
      enabled: true
    - name: Search
      value: ""
      type: query
      enabled: true
    - name: SearchByName
      value: ""
      type: query
      enabled: true
    - name: SearchByCode
      value: ""
      type: query
      enabled: true
    - name: SearchByNotes
      value: ""
      type: query
      enabled: true
    - name: SearchByRouteId
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 403 Forbidden — permissions not granted for sandbox token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/Scheduling/routes
      method: GET
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Insufficient permissions to perform this action.","isUserError":false,"errorKey":null}
