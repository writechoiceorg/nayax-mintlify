info:
  name: Update Machine Tasks
  type: http
  seq: 15

http:
  method: PUT
  url: https://qa-lynx.nayax.com/operational/v1/Scheduling/schedule/machine-tasks
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      [
        {
          "SchedulingId": 0,
          "MachineId": 0,
          "TaskLutId": "",
          "DriverId": "00000000-0000-0000-0000-000000000000",
          "ScheduleDate": "2024-01-01T00:00:00Z",
          "StatusId": 1,
          "Notes": "",
          "GeneratePickList": false,
          "ScheduleNextWorkingDay": false,
          "TimezoneOffset": 0
        }
      ]

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 400 — task not found; no machine tasks exist in sandbox to update
    request:
      url: https://qa-lynx.nayax.com/operational/v1/Scheduling/schedule/machine-tasks
      method: PUT
      body:
        type: json
        data: '[{"SchedulingId": 999999,"MachineId": 1002511581,"TaskLutId": 996231359,"ScheduleDate": "2026-12-01T08:00:00Z","StatusId": 1,"Notes": "","GeneratePickList": false,"ScheduleNextWorkingDay": false,"TimezoneOffset": 0}]'
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Task {0} is not found","isUserError":false,"errorKey":null}
