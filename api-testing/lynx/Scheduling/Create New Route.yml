info:
  name: Create New Route
  type: http
  seq: 6

http:
  method: POST
  url: https://qa-lynx.nayax.com/operational/v1/Scheduling/routes
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: OperatorId
      value: ""
      type: query
      enabled: true
  body:
    type: json
    data: |
      {
        "RouteName": "",
        "RouteCode": "",
        "DriverId": "00000000-0000-0000-0000-000000000000",
        "RouteRemarks": "",
        "RouteStatusId": 1
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 wrapping 403 — "not allowed" response from authorization layer
    request:
      url: https://qa-lynx.nayax.com/operational/v1/Scheduling/routes?OperatorId=2009586082
      method: POST
      body:
        type: json
        data: '{"RouteName": "Test Route", "Notes": "API test route"}'
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"You are not allowed to view this content","isUserError":false,"errorKey":null}
