info:
  name: Update Route
  type: http
  seq: 7

http:
  method: PUT
  url: https://qa-lynx.nayax.com/operational/v1/Scheduling/routes
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: routeId
      value: ""
      type: query
      enabled: true
  body:
    type: json
    data: |
      {
        "OperatorId": 0,
        "RouteName": "",
        "RouteCode": "",
        "DriverId": "00000000-0000-0000-0000-000000000000",
        "RouteRemarks": "",
        "RouteStatusId": 1
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 404 Not Found — no route with this routeId exists in sandbox
    request:
      url: https://qa-lynx.nayax.com/operational/v1/Scheduling/routes/1
      method: PUT
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: content-length
          value: "0"
      body:
        type: text
        data: ""
