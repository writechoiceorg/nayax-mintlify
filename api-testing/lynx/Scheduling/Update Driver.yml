info:
  name: Update Driver
  type: http
  seq: 3

http:
  method: PUT
  url: https://qa-lynx.nayax.com/operational/v1/Scheduling/drivers
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: DriverId
      value: ""
      type: query
      enabled: true
  body:
    type: json
    data: |
      {
        "UserId": 0,
        "OperatorId": 0,
        "DriverStatusId": 1,
        "StartDate": "",
        "DriverLicense": "",
        "IdNumber": "",
        "Skills": [],
        "WorkingHours": []
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 403 Forbidden — permissions not granted for sandbox token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/Scheduling/drivers
      method: PUT
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Insufficient permissions to perform this action.","isUserError":false,"errorKey":null}
