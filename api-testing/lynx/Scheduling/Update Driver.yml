info:
  name: Update Driver
  type: http
  seq: 3

http:
  method: PUT
  url: https://qa-lynx.nayax.com/operational/v1/Scheduling/drivers
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: DriverId
      value: ""
      type: query
      enabled: true
  body:
    type: json
    data: |
      {
        "UserId": 0,
        "OperatorId": 0,
        "DriverStatusId": 1,
        "StartDate": "",
        "DriverLicense": "",
        "IdNumber": "",
        "Skills": [],
        "WorkingHours": []
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 404 Not Found — no driver with this DriverId exists in sandbox
    request:
      url: https://qa-lynx.nayax.com/operational/v1/Scheduling/drivers/1
      method: PUT
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: content-length
          value: "0"
      body:
        type: text
        data: ""
