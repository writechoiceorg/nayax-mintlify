info:
  name: Remove Machine from Route
  type: http
  seq: 10

http:
  method: DELETE
  url: https://qa-lynx.nayax.com/operational/v1/Scheduling/route-machines
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: MachineId
      value: ""
      type: query
      enabled: true
    - name: RouteId
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 400 Bad Request — no route/machine assignment exists to remove
    request:
      url: https://qa-lynx.nayax.com/operational/v1/Scheduling/route-machines?RouteId=1&MachineId=1002511581
      method: DELETE
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Oops, an error has occurred","isUserError":false,"errorKey":null}
