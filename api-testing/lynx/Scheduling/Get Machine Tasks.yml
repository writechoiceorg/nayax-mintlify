info:
  name: Get Machine Tasks
  type: http
  seq: 13

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/Scheduling/schedule/machine-tasks
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: StartDate
      value: ""
      type: query
      enabled: true
    - name: EndDate
      value: ""
      type: query
      enabled: true
    - name: SchedulingId
      value: ""
      type: query
      enabled: true
    - name: ActorId
      value: ""
      type: query
      enabled: true
    - name: MachineId
      value: ""
      type: query
      enabled: true
    - name: DriverId
      value: ""
      type: query
      enabled: true
    - name: RouteId
      value: ""
      type: query
      enabled: true
    - name: TimePeriod
      value: ""
      type: query
      enabled: true
    - name: IsForlist
      value: ""
      type: query
      enabled: true
    - name: IsStatic
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK — no tasks in sandbox
    request:
      url: https://qa-lynx.nayax.com/operational/v1/Scheduling/schedule/machine-tasks?ActorId=2009586082
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          []
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/Scheduling/schedule/machine-tasks
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
