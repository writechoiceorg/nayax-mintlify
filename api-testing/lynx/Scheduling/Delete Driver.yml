info:
  name: Delete Driver
  type: http
  seq: 4

http:
  method: DELETE
  url: https://qa-lynx.nayax.com/operational/v1/Scheduling/drivers
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  params:
    - name: DriverId
      value: ""
      type: query
      enabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 404 Not Found — no driver with this DriverId exists in sandbox
    request:
      url: https://qa-lynx.nayax.com/operational/v1/Scheduling/drivers/1
      method: DELETE
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: content-length
          value: "0"
      body:
        type: text
        data: ""
