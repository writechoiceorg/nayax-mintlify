info:
  name: Get Event Rules
  type: http
  seq: 2

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/metadata/v1/event-rules
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 403 Forbidden
    request:
      url: https://qa-lynx.nayax.com/operational/v1/metadata/v1/event-rules
      method: GET
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Insufficient permissions to perform this action.","isUserError":false,"errorKey":null}
