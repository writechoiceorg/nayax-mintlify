info:
  name: Upload Picture
  type: http
  seq: 1

http:
  method: POST
  url: https://qa-lynx.nayax.com/operational/v1/metadata/upload-picture
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      {
        "ImageTypeLutId": 0,
        "EntityId": "",
        "Image": "",
        "ImageCrop": "",
        "IsMonyx": false
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 403 Forbidden
    request:
      url: https://qa-lynx.nayax.com/operational/v1/metadata/upload-picture
      method: POST
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Insufficient permissions to perform this action.","isUserError":false,"errorKey":null}
