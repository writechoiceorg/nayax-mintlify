info:
  name: Bulk Update Machine Attributes
  type: http
  seq: 4

http:
  method: PUT
  url: https://qa-lynx.nayax.com/operational/v1/machines/{MachineID}/attributes
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      [
        {
          "DeviceAttributeID": 0,
          "MachineID": 0,
          "DeviceAttributeValue": "",
          "DeviceAttributeReadOnlyBit": false
        }
      ]

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002511581/attributes
      method: PUT
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"isFullySuccess":true,"failureItems":null}
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002511581/attributes
      method: PUT
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
