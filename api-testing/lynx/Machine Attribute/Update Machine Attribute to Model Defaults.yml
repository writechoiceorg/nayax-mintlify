info:
  name: Update Machine Attribute to Model Defaults
  type: http
  seq: 1

http:
  method: POST
  url: https://qa-lynx.nayax.com/operational/v1/machines/{MachineID}/attributes/defaults
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002511581/attributes/defaults
      method: POST
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"Ok":true,"Message":null,"SystemMessage":null,"code":null}
