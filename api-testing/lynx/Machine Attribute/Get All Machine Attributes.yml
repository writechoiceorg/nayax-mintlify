info:
  name: Get All Machine Attributes
  type: http
  seq: 3

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/machines/{MachineID}/attributes
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002511581/attributes
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          [{"DeviceAttributeID":520,"MachineID":1002511581,"DeviceAttributeValue":"1","DeviceAttributeCodeID":null,"DeviceAttributeName":"Card Reader MDB Level","DeviceAttributeGroup":"Card Readers","DeviceAttributeReadOnlyBit":false,"MachineAttributeRef":"/v1/machines/1002511581/attributes/520","MachineRef":"/v1/machines/1002511581"},{"DeviceAttributeID":4361,"MachineID":1002511581,"DeviceAttributeValue":"0","DeviceAttributeCodeID":null,"DeviceAttributeName":"Contactless delay start","DeviceAttributeGroup":"Card Readers","DeviceAttributeReadOnlyBit":false,"MachineAttributeRef":"/v1/machines/1002511581/attributes/4361","MachineRef":"/v1/machines/1002511581"},{"DeviceAttributeID":523,"MachineID":1002511581,"DeviceAttributeValue":"2","DeviceAttributeCodeID":2,"DeviceAttributeName":"Decimal Place","DeviceAttributeGroup":"Card Readers","DeviceAttributeReadOnlyBit":false,"MachineAttributeRef":"/v1/machines/1002511581/attributes/523","MachineRef":"/v1/machines/1002511581"}]
  - name: 401 Unauthorized — expired or invalid token
    request:
      url: https://qa-lynx.nayax.com/operational/v1/machines/1002511581/attributes
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {"message":"Unauthorized","isUserError":false,"errorKey":null}
