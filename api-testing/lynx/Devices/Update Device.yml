info:
  name: Update Device
  type: http
  seq: 2

http:
  method: PUT
  url: https://qa-lynx.nayax.com/operational/v1/devices/{DeviceID}
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      {
        "ActorID": 0,
        "StatusID": 0
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK — response not yet captured, re-run to save
    request:
      url: https://qa-lynx.nayax.com/operational/v1/devices/{DeviceID}
      method: PUT
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: text
        data: ""
