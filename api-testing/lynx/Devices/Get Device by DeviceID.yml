info:
  name: Get Device by DeviceID
  type: http
  seq: 1

http:
  method: GET
  url: https://qa-lynx.nayax.com/operational/v1/devices/{DeviceID}
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK — note: sandbox DeviceIDs are all 0, see gap-log.md
    request:
      url: https://qa-lynx.nayax.com/operational/v1/devices/{DeviceID}
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          {}
