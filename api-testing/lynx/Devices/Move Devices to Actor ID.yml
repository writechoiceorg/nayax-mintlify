info:
  name: Move Devices to Actor ID
  type: http
  seq: 4

http:
  method: PUT
  url: https://qa-lynx.nayax.com/operational/v1/devices/move/{actorId}
  auth:
    type: bearer
    token: {{NAYAX_TOKEN}}
  body:
    type: json
    data: |
      [
        "device-serial-1",
        "device-serial-2"
      ]

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK — empty array (silent failure when serial does not match)
    request:
      url: https://qa-lynx.nayax.com/operational/v1/devices/move/{actorId}
      method: PUT
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json; charset=utf-8
      body:
        type: json
        data: |-
          []
